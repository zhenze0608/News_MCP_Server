name: 每日早报

on:
  schedule:
    # 每天早上 7:00 UTC = 北京时间 15:00（你起床前就到邮箱了）
    # 可以根据你习惯的时间改
    - cron: "0 22 * * *"   # UTC 22:00 = 北京时间 06:00
  workflow_dispatch:       # 也支持手动触发，在 GitHub 网页上点一下就行
    inputs:
      categories:
        description: "分类（逗号分隔）"
        default: "world,domestic,technology,business"
        required: false

permissions:
  contents: read

jobs:
  daily_brief:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run daily brief
        env:
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
          # 不传 EMAIL_TEMPLATE_PATH，用仓库默认模板
        run: python scripts/daily_brief_standalone.py
