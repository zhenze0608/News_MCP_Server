<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{subject}}</title>
</head>
<body style="margin:0;padding:0;background:#f3f5f7;color:#1f2933;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;">
  <div style="display:none;max-height:0;overflow:hidden;opacity:0;color:transparent;">
    {{preheader}}
  </div>
  <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="background:#f3f5f7;margin:0;padding:24px 0;">
    <tr>
      <td align="center" style="padding:0 12px;">
        <table role="presentation" cellpadding="0" cellspacing="0" width="100%" style="max-width:720px;background:#ffffff;border:1px solid #d9e2ec;border-radius:8px;overflow:hidden;">
          <tr>
            <td style="background:#102a43;padding:22px 28px;">
              <div style="font-size:12px;letter-spacing:0;color:#bcccdc;margin-bottom:8px;">World Monitor · Free News MCP</div>
              <h1 style="margin:0;color:#ffffff;font-size:22px;line-height:1.35;font-weight:700;">{{subject}}</h1>
              <div style="margin-top:10px;color:#d9e2ec;font-size:13px;">📅 {{generated_at}} · 数据来源: NewsAPI + RSS</div>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 30px 22px 30px;background:#ffffff;">
              <div style="font-size:15px;line-height:1.72;color:#243b53;">
                {{body_html}}
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:18px 34px;background:#ffffff;border-top:1px solid #d9e2ec;">
              <div style="font-size:14px;line-height:1.7;color:#3e4c59;">
                {{footer_note}}
              </div>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
